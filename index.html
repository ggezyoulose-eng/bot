<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Script bot</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
:root{
  --bg:#0f0f13;--bg2:#1a1a22;--bg3:#22222e;--bg4:#2a2a38;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);
  --text:#f0f0f5;--text2:#9090b0;--text3:#5a5a78;
  --blue:#4f8ef7;--blue2:#3a7ce8;--green:#3dd68c;--red:#f7614f;
  --orange:#f7a94f;--purple:#a78bfa;
  --font:'Inter',-apple-system,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);font-family:var(--font);-webkit-font-smoothing:antialiased;overflow:hidden;}

/* ── LAYOUT ── */
#app{height:100dvh;display:flex;flex-direction:column;max-width:720px;margin:0 auto;position:relative;}

/* ── HEADER ── */
.header{
  flex-shrink:0;
  background:rgba(26,26,34,.95);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:0 16px;
  height:60px;
  display:flex;align-items:center;gap:12px;
}
.bot-avatar{
  width:38px;height:38px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  display:flex;align-items:center;justify-content:center;font-size:20px;
  box-shadow:0 0 0 3px rgba(79,142,247,.2);
}
.bot-info{flex:1;}
.bot-name{font-size:15px;font-weight:700;letter-spacing:-.2px;}
.bot-status{font-size:11px;color:var(--green);display:flex;align-items:center;gap:4px;margin-top:1px;}
.bot-status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;}
.header-note{font-size:10px;color:var(--text3);}

/* ── MESSAGES ── */
.msgs{
  flex:1;overflow-y:auto;
  padding:16px 12px;
  display:flex;flex-direction:column;
  gap:12px;
  scroll-behavior:smooth;
}
.msgs::-webkit-scrollbar{width:3px;}
.msgs::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px;}

/* ── MESSAGE BUBBLES ── */
.msg-row{display:flex;gap:8px;align-items:flex-end;}
.msg-row.user{flex-direction:row-reverse;}

.msg-av{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  display:flex;align-items:center;justify-content:center;font-size:15px;
  margin-bottom:2px;
}
.msg-av.user-av{
  background:var(--bg3);border:1px solid var(--border2);font-size:14px;
}

.bubble-wrap{display:flex;flex-direction:column;max-width:78%;gap:4px;}
.msg-row.user .bubble-wrap{align-items:flex-end;}

.bubble{
  padding:10px 13px;border-radius:18px;
  font-size:14px;line-height:1.55;word-break:break-word;
}
.bubble.bot{
  background:var(--bg2);color:var(--text);
  border:1px solid var(--border);
  border-bottom-left-radius:5px;
}
.bubble.user{
  background:var(--blue);color:#fff;
  border-bottom-right-radius:5px;
}
.bubble-time{font-size:10px;color:var(--text3);padding:0 4px;}

/* ── RESULT CARDS ── */
.result-cards{display:flex;flex-direction:column;gap:6px;margin-top:8px;}
.result-card{
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:12px;padding:10px 12px;cursor:pointer;
  transition:all .15s;display:flex;gap:10px;align-items:center;
}
.result-card:hover{border-color:var(--blue);transform:translateX(2px);}
.result-card:active{transform:scale(.98);}
.rc-img{
  width:44px;height:44px;border-radius:8px;
  object-fit:cover;background:var(--bg4);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:22px;
}
.rc-info{flex:1;min-width:0;}
.rc-title{
  font-size:12px;font-weight:600;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;
}
.rc-meta{display:flex;gap:8px;flex-wrap:wrap;}
.rc-badge{font-size:10px;color:var(--text3);}
.rc-badge.green{color:var(--green);}
.rc-badge.orange{color:var(--orange);}
.rc-copy{
  padding:5px 10px;border-radius:8px;border:1px solid var(--border2);
  background:transparent;color:var(--text2);font-family:var(--font);
  font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;flex-shrink:0;
  white-space:nowrap;
}
.rc-copy:hover{background:var(--blue);color:#fff;border-color:var(--blue);}

/* ── MORE RESULTS BUTTON ── */
.more-btn{
  display:inline-flex;align-items:center;gap:5px;
  margin-top:8px;padding:6px 14px;border-radius:14px;
  border:1px solid var(--border2);background:transparent;
  color:var(--blue);font-family:var(--font);font-size:12px;font-weight:600;
  cursor:pointer;transition:all .15s;
}
.more-btn:hover{background:rgba(79,142,247,.1);}

/* ── TYPING INDICATOR ── */
.typing-row{display:flex;gap:8px;align-items:flex-end;}
.typing-bubble{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:18px;border-bottom-left-radius:5px;
  padding:12px 16px;display:flex;gap:5px;align-items:center;
}
.typing-dot{
  width:7px;height:7px;border-radius:50%;background:var(--text3);
  animation:tdot 1.2s infinite;
}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:.5;}30%{transform:translateY(-6px);opacity:1;}}

/* ── SUGGESTIONS ── */
.suggestions{
  flex-shrink:0;
  padding:8px 12px;
  display:flex;gap:7px;overflow-x:auto;
}
.suggestions::-webkit-scrollbar{display:none;}
.sugg-btn{
  flex-shrink:0;padding:7px 13px;border-radius:20px;
  border:1px solid var(--border2);background:var(--bg2);
  color:var(--text2);font-family:var(--font);font-size:12px;font-weight:500;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.sugg-btn:hover{border-color:var(--blue);color:var(--blue);background:rgba(79,142,247,.06);}
.sugg-btn:active{transform:scale(.95);}

/* ── INPUT BAR ── */
.input-bar{
  flex-shrink:0;
  padding:10px 12px calc(10px + env(safe-area-inset-bottom));
  background:rgba(26,26,34,.95);
  border-top:1px solid var(--border);
  display:flex;gap:8px;align-items:flex-end;
}
.chat-input{
  flex:1;min-height:40px;max-height:120px;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:20px;padding:10px 16px;
  font-family:var(--font);font-size:14px;color:var(--text);
  outline:none;resize:none;line-height:1.4;
  transition:border-color .15s;
  overflow-y:auto;
}
.chat-input:focus{border-color:var(--blue);}
.chat-input::placeholder{color:var(--text3);}
.send-btn{
  width:40px;height:40px;border-radius:50%;border:none;
  background:var(--blue);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;transition:all .15s;flex-shrink:0;
}
.send-btn:hover{background:var(--blue2);}
.send-btn:active{transform:scale(.9);}
.send-btn:disabled{background:var(--bg3);color:var(--text3);cursor:not-allowed;}

/* ── DETAIL MODAL ── */
.modal-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.7);
  z-index:300;display:none;align-items:flex-end;
  backdrop-filter:blur(6px);
}
.modal-overlay.show{display:flex;}
.modal{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:24px 24px 0 0;width:100%;max-height:88%;
  overflow-y:auto;animation:slideUp .3s cubic-bezier(.4,0,.2,1);
}
.modal::-webkit-scrollbar{display:none;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:none;}}
.modal-handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:12px auto 0;}
.modal-img{width:100%;aspect-ratio:16/9;object-fit:cover;background:var(--bg3);}
.modal-body{padding:18px;}
.modal-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.modal-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;}
.badge-free{background:rgba(61,214,140,.12);color:var(--green);}
.badge-key{background:rgba(247,169,79,.12);color:var(--orange);}
.badge-mobile{background:rgba(79,142,247,.12);color:var(--blue);}
.badge-paid{background:rgba(247,97,79,.12);color:var(--red);}
.modal-title{font-size:18px;font-weight:700;margin-bottom:6px;line-height:1.3;}
.modal-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;background:var(--bg3);border-radius:12px;padding:12px;margin:12px 0;}
.mstat{text-align:center;}
.mstat-v{font-size:17px;font-weight:700;color:var(--blue);}
.mstat-l{font-size:10px;color:var(--text3);margin-top:2px;}
.modal-desc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:14px;white-space:pre-wrap;}
.script-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;font-family:monospace;font-size:11px;color:var(--green);max-height:140px;overflow-y:auto;word-break:break-all;white-space:pre-wrap;line-height:1.6;margin-bottom:14px;}
.script-box::-webkit-scrollbar{width:3px;}
.script-box::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px;}
.modal-actions{display:flex;gap:8px;padding-bottom:8px;}
.mact{flex:1;height:44px;border-radius:12px;border:none;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;}
.mact.primary{background:var(--blue);color:#fff;}
.mact.secondary{background:var(--bg3);color:var(--text);}
.mact:active{transform:scale(.97);}

/* ── TOAST ── */
#toast{
  position:absolute;bottom:80px;left:50%;
  transform:translateX(-50%) translateY(16px);
  background:rgba(15,15,19,.96);border:1px solid var(--border2);
  color:var(--text);border-radius:24px;padding:8px 18px;
  font-size:13px;font-weight:500;opacity:0;transition:all .3s;
  pointer-events:none;z-index:999;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="bot-avatar">🤖</div>
    <div class="bot-info">
      <div class="bot-name">RBot</div>
      <div class="bot-status">オンライン — Rscripts.net に接続中</div>
    </div>
    <div class="header-note">Powered by Rscripts.net</div>
  </div>

  <!-- MESSAGES -->
  <div class="msgs" id="msgs"></div>

  <!-- SUGGESTIONS -->
  <div class="suggestions" id="suggWrap">
    <button class="sugg-btn" onclick="sendSugg(this)">🎮 Blox Fruits</button>
    <button class="sugg-btn" onclick="sendSugg(this)">🔑 キーなし</button>
    <button class="sugg-btn" onclick="sendSugg(this)">📱 モバイル対応</button>
    <button class="sugg-btn" onclick="sendSugg(this)">🔥 トレンド</button>
    <button class="sugg-btn" onclick="sendSugg(this)">⚔️ Arsenal</button>
    <button class="sugg-btn" onclick="sendSugg(this)">🏠 Brookhaven</button>
    <button class="sugg-btn" onclick="sendSugg(this)">🌊 Shindo Life</button>
    <button class="sugg-btn" onclick="sendSugg(this)">🆓 無料のみ</button>
  </div>

  <!-- INPUT -->
  <div class="input-bar">
    <textarea class="chat-input" id="chatInput" placeholder="ゲーム名やキーワードを入力…" rows="1"
      oninput="autoResize(this)"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMsg()">➤</button>
  </div>

  <!-- DETAIL MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" id="modal">
      <div class="modal-handle"></div>
      <img class="modal-img" id="mImg" src="" alt="" onerror="this.style.display='none'">
      <div class="modal-body">
        <div class="modal-badges" id="mBadges"></div>
        <div class="modal-title" id="mTitle"></div>
        <div class="modal-stats" id="mStats"></div>
        <div class="modal-desc" id="mDesc"></div>
        <div id="mScriptWrap" style="display:none">
          <div style="font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.06em;margin-bottom:6px;">スクリプト</div>
          <div class="script-box" id="mScript"></div>
        </div>
        <div class="modal-actions">
          <button class="mact secondary" onclick="closeModal()">閉じる</button>
          <button class="mact primary" id="mCopyBtn" onclick="copyModalScript()">📋 コピー</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script>
const BASE = 'https://rscripts.net/api/v2';
let busy = false;
let modalScriptContent = null;

// ══════════════════
// AUTO RESIZE
// ══════════════════
function autoResize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
}

// ══════════════════
// SEND
// ══════════════════
function sendSugg(el){
  const text = el.textContent.replace(/^[^\s]+\s/,'').trim(); // emoji除去
  document.getElementById('chatInput').value = text;
  sendMsg();
}

function sendMsg(){
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text || busy) return;
  input.value = ''; input.style.height='auto';
  hideSugg();
  addUserMsg(text);
  process(text);
}

// ══════════════════
// PROCESS
// ══════════════════
async function process(text){
  busy = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  const lower = text.toLowerCase();
  await wait(600 + Math.random()*400);
  removeTyping();

  // トレンド
  if(/トレンド|人気|trending|hot/i.test(text)){
    await replyTrending();
  }
  // ヘルプ
  else if(/help|使い方|ヘルプ|何ができ/i.test(text)){
    addBotMsg(`こんな感じで聞いてみてください👇\n\n• ゲーム名（例：Blox Fruits）\n• 「キーなしのスクリプト」\n• 「モバイル対応スクリプト」\n• 「無料のみ」\n• 「トレンドは？」`);
  }
  // 検索
  else {
    await replySearch(text);
  }

  busy = false;
  document.getElementById('sendBtn').disabled = false;
}

// ══════════════════
// SEARCH
// ══════════════════
function extractQuery(text){
  return text
    .replace(/キーなし|no.?key|キー無し/gi,'')
    .replace(/モバイル(対応)?|mobile/gi,'')
    .replace(/無料|free|フリー/gi,'')
    .replace(/スクリプト(を?)?(探して|教えて|ある|ください|ちょうだい|見せて)?/gi,'')
    .replace(/教えて|探して|ください|ちょうだい|見せて|ある？|ある\?/gi,'')
    .replace(/🎮|🔑|📱|🔥|⚔️|🏠|🌊|🆓/g,'')
    .trim();
}
function extractFilters(text){
  return {
    noKey:  /キーなし|no.?key|キー無し/i.test(text),
    mobile: /モバイル|mobile/i.test(text),
    free:   /無料|free|フリー/i.test(text),
  };
}

async function replySearch(text){
  const query = extractQuery(text);
  const f = extractFilters(text);
  if(!query && !f.noKey && !f.mobile && !f.free){
    addBotMsg('もう少し具体的に教えてください😊\n例：「Blox Fruitsのスクリプト」');
    return;
  }
  const params = new URLSearchParams({page:1,orderBy:'views',sort:'desc'});
  if(query) params.set('q',query);
  if(f.noKey) params.set('keySystem','false');
  if(f.mobile) params.set('mobileReady','true');
  if(f.free) params.set('paid','false');

  try{
    const res = await fetch(`${BASE}/scripts?${params}`);
    const data = await res.json();
    const scripts = data.scripts||[];
    const total = data.info?.totalResults||scripts.length;

    if(scripts.length===0){
      addBotMsg(`「${query||'その条件'}」に合うスクリプトは見つかりませんでした😢\n別のキーワードを試してみてください！`);
      return;
    }

    let desc=[];
    if(f.noKey) desc.push('キーなし');
    if(f.mobile) desc.push('モバイル対応');
    if(f.free) desc.push('無料');
    const tag = desc.length?` (${desc.join('・')})`:'' ;

    addBotMsg(
      `「${query||'検索'}」${tag}の結果 **${fmt(total)}件** ！\nトップ ${Math.min(4,scripts.length)} 件を表示します 👇`,
      scripts.slice(0,4),
      total > 4 ? {label:`もっと見る (${fmt(total)}件)`, query, filters:f} : null
    );
  }catch(e){
    addBotMsg('検索中にエラーが発生しました😓\nもう一度試してください。');
  }
}

async function replyTrending(){
  try{
    const res = await fetch(`${BASE}/trending`);
    const data = await res.json();
    const scripts = (data.success||[]).map(t=>t.script||t).slice(0,4);
    addBotMsg('🔥 **今のトレンドスクリプト**です！', scripts, null);
  }catch(e){
    addBotMsg('トレンドの取得に失敗しました😓');
  }
}

// ══════════════════
// MESSAGES
// ══════════════════
function addUserMsg(text){
  const msgs = document.getElementById('msgs');
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `
    <div class="bubble-wrap">
      <div class="bubble user">${esc(text)}</div>
      <div class="bubble-time">${now()}</div>
    </div>
    <div class="msg-av user-av">👤</div>`;
  msgs.appendChild(row);
  scrollMsgs();
}

function addBotMsg(text, scripts=[], more=null){
  const msgs = document.getElementById('msgs');
  const row = document.createElement('div');
  row.className = 'msg-row';

  // テキスト整形（**bold**）
  const htmlText = esc(text)
    .replace(/\n/g,'<br>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');

  let cardsHtml = '';
  if(scripts.length>0){
    cardsHtml = `<div class="result-cards">${scripts.map(s=>renderCard(s)).join('')}</div>`;
  }
  let moreHtml = '';
  if(more){
    const q = encodeURIComponent(JSON.stringify(more));
    moreHtml = `<button class="more-btn" onclick="loadMore('${q}')">📋 ${esc(more.label)}</button>`;
  }

  row.innerHTML = `
    <div class="msg-av">🤖</div>
    <div class="bubble-wrap">
      <div class="bubble bot">${htmlText}${cardsHtml}${moreHtml}</div>
      <div class="bubble-time">${now()}</div>
    </div>`;
  msgs.appendChild(row);
  scrollMsgs();
}

function renderCard(s){
  const img = s.image
    ? `<img class="rc-img" src="${esc(s.image)}" alt="" onerror="this.outerHTML='<div class=\\'rc-img\\'>📜</div>'">`
    : `<div class="rc-img">📜</div>`;
  return `<div class="result-card" onclick="openDetail('${s._id}')">
    ${img}
    <div class="rc-info">
      <div class="rc-title">${esc(s.title||'No title')}</div>
      <div class="rc-meta">
        <span class="rc-badge">👁 ${fmt(s.views||0)}</span>
        <span class="rc-badge">❤️ ${fmt(s.likes||0)}</span>
        <span class="rc-badge ${s.keySystem?'orange':'green'}">${s.keySystem?'🔑 キーあり':'✅ キーなし'}</span>
        ${s.mobileReady?'<span class="rc-badge">📱</span>':''}
      </div>
    </div>
    <button class="rc-copy" onclick="event.stopPropagation();quickCopy('${s._id}','${esc(s.rawScript||'')}')">コピー</button>
  </div>`;
}

async function loadMore(q){
  const data = JSON.parse(decodeURIComponent(q));
  const {query, filters} = data;
  // メッセージとして送信
  const text = [query, filters.noKey?'キーなし':'', filters.mobile?'モバイル':'', filters.free?'無料':''].filter(Boolean).join(' ');
  addUserMsg(`もっと見る: ${text}`);
  showTyping();
  await wait(600);
  removeTyping();
  // page2を取得
  const params = new URLSearchParams({page:2,orderBy:'views',sort:'desc'});
  if(query) params.set('q',query);
  if(filters.noKey) params.set('keySystem','false');
  if(filters.mobile) params.set('mobileReady','true');
  if(filters.free) params.set('paid','false');
  try{
    const res = await fetch(`${BASE}/scripts?${params}`);
    const dd = await res.json();
    const scripts = dd.scripts||[];
    if(scripts.length===0){ addBotMsg('これ以上見つかりませんでした😢'); return; }
    addBotMsg(`続きの ${scripts.length} 件です👇`, scripts.slice(0,4), null);
  }catch(e){ addBotMsg('取得に失敗しました😓'); }
}

// ══════════════════
// TYPING
// ══════════════════
function showTyping(){
  const msgs = document.getElementById('msgs');
  const row = document.createElement('div');
  row.className = 'typing-row'; row.id = 'typingRow';
  row.innerHTML = `
    <div class="msg-av">🤖</div>
    <div class="typing-bubble">
      <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
    </div>`;
  msgs.appendChild(row);
  scrollMsgs();
}
function removeTyping(){ document.getElementById('typingRow')?.remove(); }

// ══════════════════
// DETAIL MODAL
// ══════════════════
async function openDetail(id){
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('mTitle').textContent = '読み込み中…';
  document.getElementById('mDesc').textContent = '';
  document.getElementById('mBadges').innerHTML = '';
  document.getElementById('mStats').innerHTML = '';
  document.getElementById('mScriptWrap').style.display = 'none';
  document.getElementById('mImg').src = '';
  document.getElementById('mImg').style.display = 'block';
  modalScriptContent = null;
  try{
    const res = await fetch(`${BASE}/script?id=${id}`);
    const data = await res.json();
    const s = Array.isArray(data.script)?data.script[0]:(data.script||data);
    document.getElementById('mImg').src = s.image||'';
    document.getElementById('mTitle').textContent = s.title||'No title';
    document.getElementById('mBadges').innerHTML = [
      s.keySystem?'<span class="modal-badge badge-key">🔑 キーあり</span>':'<span class="modal-badge badge-free">✅ キーなし</span>',
      s.mobileReady?'<span class="modal-badge badge-mobile">📱 モバイル対応</span>':'',
      s.paid?'<span class="modal-badge badge-paid">💰 有料</span>':'<span class="modal-badge badge-free">無料</span>',
    ].join('');
    document.getElementById('mStats').innerHTML = `
      <div class="mstat"><div class="mstat-v">${fmt(s.views||0)}</div><div class="mstat-l">ビュー</div></div>
      <div class="mstat"><div class="mstat-v">${fmt(s.likes||0)}</div><div class="mstat-l">いいね</div></div>
      <div class="mstat"><div class="mstat-v">${fmt(s.dislikes||0)}</div><div class="mstat-l">よくない</div></div>`;
    document.getElementById('mDesc').textContent = s.description||'説明なし';
    if(s.rawScript){
      const r = await fetch(s.rawScript);
      const txt = await r.text();
      modalScriptContent = txt;
      document.getElementById('mScript').textContent = txt;
      document.getElementById('mScriptWrap').style.display = 'block';
    }
  }catch(e){ document.getElementById('mTitle').textContent = 'エラー: 読み込み失敗'; }
}

function closeModal(){ document.getElementById('modalOverlay').classList.remove('show'); }

function copyModalScript(){
  if(!modalScriptContent){ toast('スクリプトを読み込んでいます…'); return; }
  copyText(modalScriptContent,'✅ スクリプトをコピーしました！');
}

async function quickCopy(id, rawUrl){
  if(!rawUrl){ toast('スクリプトURLがありません'); return; }
  toast('⏳ 取得中…');
  try{
    const res = await fetch(rawUrl);
    const txt = await res.text();
    copyText(txt,'✅ コピーしました！');
  }catch(e){ toast('❌ 失敗しました'); }
}

function copyText(text, successMsg){
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>toast(successMsg));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    toast(successMsg);
  }
}

  const w = document.getElementById('suggWrap');

}

// ══════════════════
// UTILS
// ══════════════════
function scrollMsgs(){ const m=document.getElementById('msgs'); m.scrollTop=m.scrollHeight; }
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }
function now(){ const d=new Date(); return `${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`; }
function fmt(n){ return Number(n).toLocaleString('ja-JP'); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}
